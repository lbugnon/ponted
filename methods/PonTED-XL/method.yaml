name: PonTED-XL
description: ProtT5 (prot_t5_xl_half_uniref50-enc, 1024-d) frozen + 1-layer transformer
  (d=192), DisProt linker pool + TED-v0.2 Boltz-core (sequence-homology-filtered),
  5-partition ensemble.
source_run: results/production/prott5_ted_sfilt
backbone:
  id: Rostlab/prot_t5_xl_half_uniref50-enc
  embed_dim: 1024
head:
