  kernel_size: 5
  n_outputs: 1
  num_layers: 1
  d_model: 192
  dim_feedforward: 512
  dropout: 0.2
input_dim: 1024
structure_channels: []
sequence_channels: []
sequence:
  variant: null
binary_threshold: 0.2668
n_folds: 5
smoothing:
  method: median
  window: 5
