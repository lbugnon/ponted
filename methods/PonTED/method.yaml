name: PonTED
description: ESM-2 650M frozen + 1-layer transformer (d=192), DisProt linker pool
  + TED-v0.2 Boltz-core labels (sequence-homology-filtered), 5-partition train/val
  ensemble.
source_run: results/production/esm2_ted_sfilt
backbone:
  id: facebook/esm2_t33_650M_UR50D
  embed_dim: 1280
head:
  name: transformer_lite
  kernel_size: 5
  n_outputs: 1
  num_layers: 1
  d_model: 192
  dim_feedforward: 512
  dropout: 0.2
input_dim: 1280
structure_channels: []
sequence_channels: []
sequence:
  variant: null
binary_threshold: 0.253
n_folds: 5
smoothing:
  method: median
  window: 5
